<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRM Churn Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 24px 32px;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { margin-top: 4px; font-size: 0.9rem; opacity: 0.65; }

    main { max-width: 900px; margin: 32px auto; padding: 0 16px 48px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 18px;
      border-bottom: 1px solid #f0f2f5;
      padding-bottom: 10px;
    }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 4px; }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 11px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 0.875rem;
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
      appearance: auto;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
      background: #fff;
    }

    .optional { color: #9ca3af; font-weight: 400; font-size: 0.75rem; }

    button[type="submit"] {
      display: block;
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 8px;
    }
    button[type="submit"]:hover  { background: #4338ca; }
    button[type="submit"]:active { transform: scale(.98); }
    button[type="submit"]:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* ── Result card ── */
    #result { display: none; }

    .result-banner {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .result-banner.churn    { background: #fef2f2; border: 1px solid #fca5a5; }
    .result-banner.no-churn { background: #f0fdf4; border: 1px solid #86efac; }

    .result-verdict {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
    }
    .churn    .result-verdict { color: #dc2626; }
    .no-churn .result-verdict { color: #16a34a; }

    .result-label { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }

    .prob-bar-wrap { flex: 1; }
    .prob-bar-wrap .prob-label {
      font-size: 0.75rem; font-weight: 600; color: #374151; margin-bottom: 4px;
      display: flex; justify-content: space-between;
    }
    .prob-bar-bg {
      background: #e5e7eb; border-radius: 99px; height: 10px; overflow: hidden;
    }
    .prob-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width .6s ease;
    }
    .churn    .prob-bar-fill { background: #dc2626; }
    .no-churn .prob-bar-fill { background: #16a34a; }

    .risk-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .risk-High   { background: #fee2e2; color: #dc2626; }
    .risk-Medium { background: #fef3c7; color: #d97706; }
    .risk-Low    { background: #dcfce7; color: #16a34a; }

    .result-meta { font-size: 0.8rem; color: #6b7280; }
    .result-meta span { margin-right: 16px; }

    .error-msg {
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 12px 16px;
      color: #dc2626; font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <h1>CRM Churn Intelligence</h1>
  <p>Enter customer details below to predict churn probability</p>
</header>

<main>
  <form id="predict-form">

    <!-- ── Customer Profile ── -->
    <div class="card">
      <h2>Customer Profile</h2>
      <div class="grid">

        <div>
          <label>Customer ID <span class="optional">(optional)</span></label>
          <input type="text" name="customerID" value="7590-VHVEG" placeholder="e.g. 1234-ABCDE"/>
        </div>

        <div>
          <label>Gender</label>
          <select name="gender">
            <option>Female</option>
            <option>Male</option>
          </select>
        </div>

        <div>
          <label>Senior Citizen</label>
          <select name="SeniorCitizen">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>

        <div>
          <label>Partner</label>
          <select name="Partner">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Dependents</label>
          <select name="Dependents">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>

        <div>
          <label>Tenure (months)</label>
          <input type="number" name="tenure" value="12" min="0" max="72" required/>
        </div>

      </div>
    </div>

    <!-- ── Services ── -->
    <div class="card">
      <h2>Services</h2>
      <div class="grid">

        <div>
          <label>Phone Service</label>
          <select name="PhoneService">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>

        <div>
          <label>Multiple Lines</label>
          <select name="MultipleLines">
            <option>No phone service</option>
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>

        <div>
          <label>Internet Service</label>
          <select name="InternetService">
            <option>DSL</option>
            <option>Fiber optic</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Online Security</label>
          <select name="OnlineSecurity">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
          </select>
        </div>

        <div>
          <label>Online Backup</label>
          <select name="OnlineBackup">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
          </select>
        </div>

        <div>
          <label>Device Protection</label>
          <select name="DeviceProtection">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
          </select>
        </div>

        <div>
          <label>Tech Support</label>
          <select name="TechSupport">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
          </select>
        </div>

        <div>
          <label>Streaming TV</label>
          <select name="StreamingTV">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
          </select>
        </div>

        <div>
          <label>Streaming Movies</label>
          <select name="StreamingMovies">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
          </select>
        </div>

      </div>
    </div>

    <!-- ── Billing ── -->
    <div class="card">
      <h2>Billing</h2>
      <div class="grid">

        <div>
          <label>Contract</label>
          <select name="Contract">
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
          </select>
        </div>

        <div>
          <label>Paperless Billing</label>
          <select name="PaperlessBilling">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>

        <div>
          <label>Payment Method</label>
          <select name="PaymentMethod">
            <option>Electronic check</option>
            <option>Mailed check</option>
            <option>Bank transfer (automatic)</option>
            <option>Credit card (automatic)</option>
          </select>
        </div>

        <div>
          <label>Monthly Charges ($)</label>
          <input type="number" name="MonthlyCharges" value="29.85" step="0.01" min="0" required/>
        </div>

        <div>
          <label>Total Charges ($) <span class="optional">(0 for new customers)</span></label>
          <input type="number" name="TotalCharges" value="358.20" step="0.01" min="0" required/>
        </div>

      </div>
    </div>

    <button type="submit" id="submit-btn">Predict Churn</button>
  </form>

  <!-- ── Result ── -->
  <div id="result" class="card" style="margin-top:24px;">
    <h2>Prediction Result</h2>
    <div id="result-inner"></div>
  </div>

</main>

<script>
  const form   = document.getElementById('predict-form');
  const btn    = document.getElementById('submit-btn');
  const result = document.getElementById('result');
  const inner  = document.getElementById('result-inner');

  const INT_FIELDS   = ['SeniorCitizen', 'tenure'];
  const FLOAT_FIELDS = ['MonthlyCharges', 'TotalCharges'];

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Predicting…';
    inner.innerHTML = '';
    result.style.display = 'none';

    const fd   = new FormData(form);
    const body = {};
    for (const [k, v] of fd.entries()) {
      if (INT_FIELDS.includes(k))        body[k] = parseInt(v, 10);
      else if (FLOAT_FIELDS.includes(k)) body[k] = parseFloat(v);
      else                               body[k] = v || null;
    }

    try {
      const res = await fetch('/predict', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json();
        inner.innerHTML = `<div class="error-msg">Error ${res.status}: ${err.detail}</div>`;
        result.style.display = 'block';
        return;
      }

      const data = await res.json();
      const isChurn  = data.churn_prediction === 'Yes';
      const pct      = (data.probability * 100).toFixed(1);
      const bannerCls = isChurn ? 'churn' : 'no-churn';
      const cid       = data.customerID ? `<span>Customer: <strong>${data.customerID}</strong></span>` : '';

      inner.innerHTML = `
        <div class="result-banner ${bannerCls}">
          <div>
            <div class="result-verdict">${isChurn ? 'Will Churn' : 'Will Stay'}</div>
            <div class="result-label">Churn Prediction: <strong>${data.churn_prediction}</strong></div>
          </div>
          <div class="prob-bar-wrap">
            <div class="prob-label">
              <span>Churn Probability</span>
              <span>${pct}%</span>
            </div>
            <div class="prob-bar-bg">
              <div class="prob-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div>
            <span class="risk-badge risk-${data.risk_level}">${data.risk_level} Risk</span>
          </div>
        </div>
        <div class="result-meta">
          ${cid}
          <span>Model probability: <strong>${data.probability}</strong></span>
          <span>Risk level: <strong>${data.risk_level}</strong></span>
        </div>
      `;
      result.style.display = 'block';

    } catch (err) {
      inner.innerHTML = `<div class="error-msg">Network error: ${err.message}</div>`;
      result.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Predict Churn';
    }
  });
</script>

</body>
</html>
